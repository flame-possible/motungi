<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f0ebe0; }

    #map-outer {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #map { width: 100%; height: 100%; }

    /* 애니풍 화풍 오버레이 — mix-blend-mode로 캔버스에도 적용 */
    #map-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: rgba(210, 185, 140, 0.28);
      mix-blend-mode: multiply;
    }

    #loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #ede8da;
      font-family: sans-serif; font-size: 13px; color: #8a7f70;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="loading">지도 불러오는 중…</div>
  <div id="map-outer">
    <div id="map"></div>
    <div id="map-overlay"></div>
  </div>

  <script type="text/javascript" src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=362savhns7"></script>
  <script>
    var map = null;
    var currentMarker = null;
    var polyline = null;
    var pathCoords = [];

    window.addEventListener('load', function() {
      initMap();
    });

    // Flutter → WebView 메시지 수신
    window.addEventListener('message', function(e) {
      var d = e.data;
      if (!d || !d.type) return;
      if (d.type === 'init')           initMap(d.lat, d.lng, d.zoom);
      if (d.type === 'updatePosition') updatePosition(d.lat, d.lng);
      if (d.type === 'clearPath')      clearPath();
    });

    window.FlutterBridge = {
      onMessage: function(json) {
        var d = JSON.parse(json);
        window.dispatchEvent(new MessageEvent('message', { data: d }));
      }
    };

    function initMap(lat, lng, zoom) {
      lat  = lat  != null ? lat  : 37.5665;
      lng  = lng  != null ? lng  : 126.9780;
      zoom = zoom != null ? zoom : 14;

      var container = document.getElementById('map');
      map = new naver.maps.Map(container, {
        center: new naver.maps.LatLng(lat, lng),
        zoom: zoom,
        mapTypeId: naver.maps.MapTypeId.NORMAL,
        zoomControl: false,
        scaleControl: false,
        logoControl: false,
        mapDataControl: false
      });

      document.getElementById('loading').style.display = 'none';
      postToFlutter({ type: 'ready' });
    }

    function updatePosition(lat, lng) {
      if (!map) return;
      var latlng = new naver.maps.LatLng(lat, lng);
      map.panTo(latlng);

      if (!currentMarker) {
        currentMarker = new naver.maps.Marker({ position: latlng, map: map });
      } else {
        currentMarker.setPosition(latlng);
      }

      pathCoords.push(latlng);
      if (polyline) polyline.setMap(null);
      polyline = new naver.maps.Polyline({
        map: map,
        path: pathCoords,
        strokeColor: '#92AEC2',
        strokeWeight: 4,
        strokeOpacity: 0.92
      });
    }

    function clearPath() {
      pathCoords = [];
      if (polyline) { polyline.setMap(null); polyline = null; }
      if (currentMarker) { currentMarker.setMap(null); currentMarker = null; }
    }

    function postToFlutter(data) {
      if (window.parent !== window) window.parent.postMessage(data, '*');
      if (window.FlutterChannel) window.FlutterChannel.postMessage(JSON.stringify(data));
    }
  </script>
</body>
</html>
